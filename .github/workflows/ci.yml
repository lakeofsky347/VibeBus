name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  container:
    name: Linux container acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Build and test Linux container
        shell: pwsh
        run: ./scripts/test-container.ps1

  macos:
    name: macOS build, Keychain, Hooks, and package
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install pinned Rust toolchain
        run: |
          rustup set auto-self-update disable
          rustup toolchain install 1.97.1 --profile minimal --component rustfmt,clippy
          rustup show active-toolchain

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --all-targets --locked

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Test native lifecycle Hooks
        run: ./scripts/test-lifecycle-hooks.sh

      - name: Test macOS Keychain lifecycle
        run: ./scripts/test-macos-keychain.sh

      - name: Build and validate macOS package
        run: |
          ./scripts/package-plugin-macos.sh
          ./scripts/validate-plugin-macos.sh dist/staging/VibeBus-0.10.0-macos-$(if [ "$(uname -m)" = arm64 ]; then echo arm64; else echo x64; fi)/plugins/vibebus
          cd dist
          shasum -a 256 -c SHA256SUMS-macos-*.txt

      - name: Upload macOS acceptance assets
        uses: actions/upload-artifact@v7
        with:
          name: vibebus-macos-${{ github.sha }}
          path: |
            dist/*.tar.gz
            dist/*macos-*.zip
            dist/SHA256SUMS-macos-*.txt
            dist/release-manifest-macos-*.json
          if-no-files-found: error
          retention-days: 14

  windows:
    name: Windows build, test, and package
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install pinned Rust toolchain
        shell: pwsh
        run: |
          rustup set auto-self-update disable
          rustup toolchain install 1.97.1 --profile minimal --component rustfmt,clippy
          rustup show active-toolchain

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 6.0.x

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --all-targets --locked

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Test lifecycle hooks
        shell: pwsh
        run: ./scripts/test-lifecycle-hooks.ps1

      - name: Build unsigned release assets
        shell: pwsh
        run: ./scripts/build-release.ps1

      - name: Test backup restore drill
        shell: pwsh
        run: ./scripts/test-backup-restore.ps1 -BinaryPath ./target/release/vibebus.exe

      - name: Validate MSI and extracted payload
        shell: pwsh
        run: |
          $msiFiles = @(Get-ChildItem -LiteralPath dist -Filter "VibeBus-*-windows-x64.msi")
          if ($msiFiles.Count -ne 1) {
            throw "Expected exactly one MSI, found $($msiFiles.Count)."
          }
          $msi = $msiFiles[0]
          ./scripts/test-installer.ps1 -MsiPath $msi.FullName

      - name: Upload CI release assets
        uses: actions/upload-artifact@v7
        with:
          name: vibebus-windows-${{ github.sha }}
          path: |
            dist/*.msi
            dist/*.zip
            dist/SHA256SUMS.txt
            dist/release-manifest.json
          if-no-files-found: error
          retention-days: 14
