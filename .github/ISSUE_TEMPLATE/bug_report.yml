name: Bug report
description: Report a reproducible problem in VibeBus.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve VibeBus. Do not include credentials, recovery keys, database copies, signing material, or security-sensitive details. For a vulnerability, use the private process in SECURITY.md instead.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Include the expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest safe sequence that reproduces the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: VibeBus version or commit
      placeholder: vX.Y.Z or commit SHA
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows x64
        - macOS arm64
        - macOS x64
        - Linux amd64 container
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized diagnostics
      description: Remove secrets, local paths, personal data, and database contents before pasting output.
