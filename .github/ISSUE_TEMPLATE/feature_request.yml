name: Feature request
description: Propose an improvement to VibeBus.
title: "feature: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem before proposing a solution. Do not include credentials, private project data, or security-sensitive implementation details.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Who is affected and what cannot they do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the desired outcome, including safe failure behavior when relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include existing workflows or workarounds.
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility and release impact
      description: Note likely CLI, MCP, database, plugin, platform, or SemVer impact.
